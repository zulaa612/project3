<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="/photobooth.css" rel="stylesheet" />
    <script src="snap.js" defer></script>
  </head>

  <body>
    <div class="appwindow">
      <div class="topBar">
        <div class="snapboothText">SnapBooth</div>
        <div class="download" id="downloadAll">
          <div class="downloadButton">↓</div>
          <div class="downloadText">Download All</div>
        </div>
      </div>
      <div class="appBody">
        <div class="videoPanel" id="videoPanel">
          <video id="webcam" autoplay playsinline></video>
          <div class="promptOverlay" id="promptOverlay">
            <h3>Grant Camera Access</h3>
            <p>Click Allow Camera to let your browser use your camera.</p>
            <div class="allowButton" id="allowBtn">Allow Camera</div>
          </div>
          <div class="liveBox" id="liveBox">
            <div class="liveDot"></div>
            <div class="liveText">Live</div>
          </div>
          <div class="photosBox" id="photosBox">0 photos</div>
        </div>
        <div class="snapSection">
          <div class="shutterButton" id="shutterBtn">
            <div class="innerRing"></div>
          </div>
          <div class="snapText">Snap</div>
        </div>
        <div class="thumbnailStrip" id="thumbStrip">
          <div class="singleThumbnail2"></div>
        </div>
      </div>
    </div>
  </body>
</html>
